<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Text Editor</title>
<meta name="theme-color" content="#111111">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Text">
<style>
  html { -webkit-text-size-adjust: 100%; }
  body { margin: 0; padding: 12px; font-family: system-ui, -apple-system, sans-serif; box-sizing: border-box; }
  #editor {
    width: 100%; height: 80vh; height: 80dvh; box-sizing: border-box;
    border: 1px solid #000; padding: 10px; font-size: 20px;
    overflow: auto; white-space: pre-wrap; outline: none;
  }
  .bar { margin-top: 8px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  button { padding: 10px 18px; font-size: 16px; cursor: pointer; touch-action: manipulation; }
  #status { font-size: 13px; color: #666; }
  #status.warn { color: #b00; }
  #snap { width: 100%; height: 70px; margin-top: 8px; font-size: 11px; display: none; box-sizing: border-box; }
</style>
</head>
<body>
  <div contenteditable="true" id="editor"></div>
  <div class="bar">
    <button onclick="saveFile()">Save .txt</button>
    <button onclick="snapshot()">Copy as link</button>
    <span id="status"></span>
  </div>
  <textarea id="snap" readonly placeholder="share link..."></textarea>

  <script>
    var KEY = "textEditorContent";
    var editor = document.getElementById("editor");
    var status = document.getElementById("status");
    var storageOK = true;

    function readSaved() {
      try { return localStorage.getItem(KEY); }
      catch (e) { storageOK = false; return null; }
    }

    // base64url <-> UTF-8, for text carried in the URL hash
    function encodeContent(str) {
      var bytes = new TextEncoder().encode(str);
      var bin = "";
      for (var i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
      return btoa(bin).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
    }
    function decodeContent(b64) {
      b64 = b64.replace(/-/g, "+").replace(/_/g, "/");
      while (b64.length % 4) b64 += "=";
      var bin = atob(b64);
      var bytes = new Uint8Array(bin.length);
      for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      return new TextDecoder().decode(bytes);
    }

    // A shared link (#content) wins over autosaved text, but only overwrites
    // local storage when there's nothing to lose - so opening a link never
    // silently destroys notes already saved on this device.
    (function init() {
      var saved = readSaved();
      if (!storageOK) {
        status.textContent = "Autosave is off here (storage blocked). Save the page as .html and open it to enable it.";
        status.className = "warn";
      }
      var hash = location.hash.slice(1);
      if (hash) {
        try {
          var shared = decodeContent(hash);
          editor.innerText = shared;
          if (storageOK && (saved === null || saved.trim() === "")) {
            try { localStorage.setItem(KEY, shared); } catch (e) {}
          }
          try { history.replaceState(null, "", location.pathname + location.search); } catch (e) {}
          return;
        } catch (e) { /* malformed hash, fall back to saved text */ }
      }
      if (saved !== null && editor.innerText.trim() === "") editor.innerText = saved;
    })();

    editor.addEventListener("input", function () {
      if (!storageOK) return;
      try {
        localStorage.setItem(KEY, editor.innerText);
        status.textContent = "Saved";
        status.className = "";
      } catch (e) {
        storageOK = false;
      }
    });

    function saveFile() {
      var blob = new Blob([editor.innerText], { type: "text/plain" });
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = "edited.txt";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    // Shareable link: current text encoded into the hash of this page's own URL
    function snapshot() {
      var base = location.href.replace(/#.*$/, "");
      var link = base + "#" + encodeContent(editor.innerText);

      function ok() {
        status.textContent = "Link copied to clipboard.";
        status.className = "";
      }
      function manual() {
        var box = document.getElementById("snap");
        box.style.display = "block";
        box.value = link;
        box.focus();
        box.select();
        box.setSelectionRange(0, link.length); // iOS ignores select() on readonly fields
        var copied = false;
        try { copied = document.execCommand("copy"); } catch (e) {}
        status.textContent = copied ? "Link copied to clipboard." : "Link ready - tap and hold the box to copy.";
        status.className = "";
      }

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(link).then(ok, manual);
      } else {
        manual();
      }
    }

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("sw.js").catch(function () {});
      });
    }
  </script>
</body>
</html>
