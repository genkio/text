<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Text Editor</title>
<style>
  html { -webkit-text-size-adjust: 100%; }
  body { margin: 0; padding: 12px; font-family: system-ui, -apple-system, sans-serif; box-sizing: border-box; }
  #editor {
    width: 100%; height: 80vh; height: 80dvh; box-sizing: border-box;
    border: 1px solid #000; padding: 10px; font-size: 20px;
    overflow: auto; white-space: pre-wrap; outline: none;
  }
  .bar { margin-top: 8px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  button { padding: 10px 18px; font-size: 16px; cursor: pointer; touch-action: manipulation; }
  #status { font-size: 13px; color: #666; }
  #status.warn { color: #b00; }
  #snap { width: 100%; height: 70px; margin-top: 8px; font-size: 11px; display: none; box-sizing: border-box; }
</style>
</head>
<body>
  <div contenteditable="true" id="editor"></div>
  <div class="bar">
    <button onclick="saveFile()">Save .txt</button>
    <button onclick="snapshot()">Copy as link</button>
    <span id="status"></span>
  </div>
  <textarea id="snap" readonly placeholder="snapshot URL..."></textarea>

  <script>
    var KEY = "textEditorContent";
    var editor = document.getElementById("editor");
    var status = document.getElementById("status");
    var storageOK = true;

    // Restore on load (only if storage works and the editor is empty)
    try {
      var saved = localStorage.getItem(KEY);
      if (saved !== null && editor.innerText.trim() === "") {
        editor.innerText = saved;
      }
    } catch (e) {
      storageOK = false;
      status.textContent = "Autosave is off here (data: URL / sandbox blocks storage). Save this as a .html file and open it to enable it.";
      status.className = "warn";
    }

    // Autosave on every edit
    editor.addEventListener("input", function () {
      if (!storageOK) return;
      try {
        localStorage.setItem(KEY, editor.innerText);
        status.textContent = "Saved";
        status.className = "";
      } catch (e) {
        storageOK = false;
      }
    });

    // Download as .txt (your original feature, with the revokeObjectURL typo fixed)
    function saveFile() {
      var blob = new Blob([editor.innerText], { type: "text/plain" });
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = "edited.txt";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    // Build a fresh data: URL with the current text baked into the page
    function snapshot() {
      var html = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
      var b64 = btoa(unescape(encodeURIComponent(html)));
      var dataUrl = "data:text/html;base64," + b64;
      var box = document.getElementById("snap");
      box.style.display = "block";
      box.value = dataUrl;
      box.focus();
      box.select();
      status.textContent = "Link ready. Press Ctrl/Cmd+C to copy, then paste it as a bookmark.";
      status.className = "";
    }
  </script>
</body>
</html>
