<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Text Editor</title>
<meta name="theme-color" content="#111111">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Text">
<style>
  html { -webkit-text-size-adjust: 100%; }
  body { margin: 0; padding: 12px; font-family: system-ui, -apple-system, sans-serif; box-sizing: border-box; }
  #editor {
    width: 100%; height: 80vh; height: 80dvh; box-sizing: border-box;
    border: 1px solid #000; padding: 10px; font-size: 20px;
    overflow: auto; white-space: pre-wrap; outline: none;
  }
  .bar { margin-top: 8px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  button { padding: 10px 18px; font-size: 16px; cursor: pointer; touch-action: manipulation; }
  #status { font-size: 13px; color: #666; }
  #status.warn { color: #b00; }
  #snap { width: 100%; height: 70px; margin-top: 8px; font-size: 11px; display: none; box-sizing: border-box; }
  dialog { border: 1px solid #000; padding: 16px; max-width: 92vw; width: 520px; box-sizing: border-box; }
  dialog::backdrop { background: rgba(0, 0, 0, 0.4); }
  dialog h2 { margin: 0 0 8px; font-size: 18px; }
  dialog p { margin: 0 0 10px; font-size: 14px; color: #333; }
  #sharePreview { white-space: pre-wrap; word-break: break-word; overflow: auto; max-height: 40vh; border: 1px solid #ccc; background: #fafafa; padding: 8px; font-size: 14px; }
  #sharePreview:empty::before { content: "(empty)"; color: #999; }
  .actions { margin-top: 12px; display: flex; gap: 8px; justify-content: flex-end; }
  .actions button { padding: 8px 16px; font-size: 15px; }
  .actions .primary { background: #111; color: #fff; border: 1px solid #111; }
</style>
</head>
<body>
  <div contenteditable="true" id="editor"></div>
  <div class="bar">
    <button onclick="saveFile()">Save .txt</button>
    <button onclick="snapshot()">Copy as link</button>
    <span id="status"></span>
  </div>
  <textarea id="snap" readonly placeholder="share link..."></textarea>

  <dialog id="shareDialog">
    <form method="dialog">
      <h2>Open shared text?</h2>
      <p>This link's text differs from the note saved here. Overwriting replaces your current note.</p>
      <div id="sharePreview"></div>
      <div class="actions">
        <button value="cancel" autofocus>Cancel</button>
        <button value="overwrite" class="primary">Overwrite</button>
      </div>
    </form>
  </dialog>

  <script>
    var KEY = "textEditorContent";
    var editor = document.getElementById("editor");
    var status = document.getElementById("status");
    var storageOK = true;

    function readSaved() {
      try { return localStorage.getItem(KEY); }
      catch (e) { storageOK = false; return null; }
    }

    // base64url <-> UTF-8, for text carried in the URL hash
    function encodeContent(str) {
      var bytes = new TextEncoder().encode(str);
      var bin = "";
      for (var i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
      return btoa(bin).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
    }
    function decodeContent(b64) {
      b64 = b64.replace(/-/g, "+").replace(/_/g, "/");
      while (b64.length % 4) b64 += "=";
      var bin = atob(b64);
      var bytes = new Uint8Array(bin.length);
      for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      return new TextDecoder().decode(bytes);
    }

    function showShareDialog(shared, onChoice) {
      var dlg = document.getElementById("shareDialog");
      document.getElementById("sharePreview").textContent = shared;
      if (typeof dlg.showModal !== "function") {
        onChoice(window.confirm("Open shared text from this link? This replaces the note saved here."));
        return;
      }
      dlg.addEventListener("close", function () {
        onChoice(dlg.returnValue === "overwrite");
      }, { once: true });
      dlg.showModal();
    }

    // A shared link (#content) loads into the editor. If a different note is
    // already saved here, preview it in a modal first so a link can't silently
    // wipe local work.
    (function init() {
      var saved = readSaved();
      if (!storageOK) {
        status.textContent = "Autosave is off here (storage blocked). Save the page as .html and open it to enable it.";
        status.className = "warn";
      }
      var current = saved !== null ? saved : "";

      function stripHash() {
        try { history.replaceState(null, "", location.pathname + location.search); } catch (e) {}
      }
      function load(text) {
        editor.innerText = text;
        if (storageOK) { try { localStorage.setItem(KEY, text); } catch (e) {} }
      }

      var hash = location.hash.slice(1);
      if (hash) {
        var shared = null;
        try { shared = decodeContent(hash); } catch (e) { shared = null; }
        if (shared !== null) {
          if (current.trim() === "" || shared === current) {
            load(shared);
            stripHash();
          } else {
            editor.innerText = current;
            showShareDialog(shared, function (overwrite) {
              if (overwrite) load(shared);
              stripHash();
            });
          }
          return;
        }
      }
      if (current !== "" && editor.innerText.trim() === "") editor.innerText = current;
    })();

    editor.addEventListener("input", function () {
      if (!storageOK) return;
      try {
        localStorage.setItem(KEY, editor.innerText);
        status.textContent = "Saved";
        status.className = "";
      } catch (e) {
        storageOK = false;
      }
    });

    function saveFile() {
      var blob = new Blob([editor.innerText], { type: "text/plain" });
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = "edited.txt";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    // Shareable link: current text encoded into the hash of this page's own URL
    function snapshot() {
      var base = location.href.replace(/#.*$/, "");
      var link = base + "#" + encodeContent(editor.innerText);

      function ok() {
        status.textContent = "Link copied to clipboard.";
        status.className = "";
      }
      function manual() {
        var box = document.getElementById("snap");
        box.style.display = "block";
        box.value = link;
        box.focus();
        box.select();
        box.setSelectionRange(0, link.length); // iOS ignores select() on readonly fields
        var copied = false;
        try { copied = document.execCommand("copy"); } catch (e) {}
        status.textContent = copied ? "Link copied to clipboard." : "Link ready - tap and hold the box to copy.";
        status.className = "";
      }

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(link).then(ok, manual);
      } else {
        manual();
      }
    }

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("sw.js").catch(function () {});
      });
    }

    // Ask the browser to keep the offline cache (iOS Safari tabs may ignore this;
    // Add to Home Screen is the reliable path there).
    if (navigator.storage && navigator.storage.persist) navigator.storage.persist();
  </script>
</body>
</html>
